<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NASA Pics - Explorador Cósmico</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🌌 NASA Space Explorer</h1>
        <p>Viaja por el universo a través de las imágenes de la NASA</p>
    </header>

    <main class="container">
        <section id="space-card">
            <h2 id="pic-title">Cargando el universo...</h2>
            
            <div id="media-container">
                <img id="pic-image" src="" alt="Astronomy Picture" style="max-width: 100%; display: none;">
            </div>

            <p id="pic-explanation">
                Conectando con los servidores de la NASA para descargar la imagen del día...
            </p>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
